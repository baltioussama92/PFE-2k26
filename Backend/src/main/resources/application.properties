# Datasource configuration (override with env vars in production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/houserental}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT settings
jwt.secret=${JWT_SECRET:bXktc3Ryb25nLXN1cGVyLXNlY3JldC1rZXktMzItYnl0ZXM=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Server settings
server.port=${SERVER_PORT:8080}
